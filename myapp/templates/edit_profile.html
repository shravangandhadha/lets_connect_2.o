{% extends 'base.html' %}
{% block title %}Let's Connect - Edit Profile{% endblock %}
{% block content %}
  <div class="card">
    <h2>Edit Profile</h2>
    <form method="post">
      {% csrf_token %}
      <p><label>Name</label><br><input type="text" name="name" value="{{ member.name }}"></p>
      <p><label>Age</label><br><input type="number" name="age" value="{{ member.age }}"></p>
      <button type="submit">Save</button>
    </form>
  </div>
{% endblock %}
