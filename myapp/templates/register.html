{% extends 'base.html' %}
{% block title %}Let's Connect - Register{% endblock %}
{% block content %}
  <div class="card">
    <h2>Register</h2>
    <form method="post">
      {% csrf_token %}
      <p><label>Name</label><br><input type="text" name="name" required></p>
      <p><label>Email</label><br><input type="email" name="email" required></p>
      <p><label>Password</label><br><input type="password" name="password" required></p>
      <p><label>Confirm Password</label><br><input type="password" name="confirm_password" required></p>
      <p><label>Terms</label><br><input type="checkbox" name="terms" value="on"></p>
      <button type="submit">Register</button>
    </form>
  </div>
{% endblock %}
