<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Connect - Register</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f9fc;--fg:#1c1c22;--card:#fff;--primary:#7c3aed;--accent:#ff4da6;--muted:#71717a;--border:#e4e4e7;--secondary:#eff6ff;--radius:0.75rem}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,var(--bg),var(--secondary));color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
a{text-decoration:none;color:inherit}
.back-btn{position:absolute;top:1rem;left:1rem;display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;border-radius:var(--radius);background:transparent;border:none;cursor:pointer;font-size:0.875rem;color:var(--fg)}
.back-btn:hover{background:rgba(0,0,0,0.05)}
.wrapper{width:100%;max-width:420px}
.header{text-align:center;margin-bottom:2rem}
.logo{display:flex;align-items:center;justify-content:center;gap:0.5rem}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:14px}
.logo-text{font-size:1.875rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(255,255,255,0.5);backdrop-filter:blur(12px);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,0.08);padding:2rem}
.card h2{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.5rem}
.card .desc{text-align:center;color:var(--muted);font-size:0.875rem;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.375rem}
.form-group input{width:100%;padding:0.625rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:0.875rem;background:rgba(255,255,255,0.5);outline:none;transition:border 0.2s}
.form-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.password-wrapper{position:relative}
.password-wrapper input{padding-right:2.5rem}
.toggle-pw{position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--muted);padding:0.25rem}
.checkbox-group{display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem}
.checkbox-group input[type="checkbox"]{width:16px;height:16px;accent-color:var(--primary)}
.checkbox-group label{font-size:0.8rem;color:var(--muted)}
.btn{width:100%;padding:0.75rem;border-radius:var(--radius);font-weight:600;font-size:0.875rem;cursor:pointer;border:none;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;margin-top:0.5rem;transition:opacity 0.2s}
.btn:hover{opacity:0.9}
.links{text-align:center;margin-top:1.5rem}
.links a{color:var(--primary);font-weight:600;font-size:0.875rem}
.links p{color:var(--muted);font-size:0.875rem}
</style>
{% load static %}
</head>
<body>

<a href="{% url 'home' %}" class="back-btn">← Back to Home</a>

<div class="wrapper">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">👥</div>
      <div class="logo-text">Let's Connect</div>
    </div>
  </div>

  <div class="card">
    <h2>Join the Community</h2>
    <p class="desc">Create your account and start connecting with amazing people nearby</p>
    
    {% if messages %}
  <ul class="messages">
    {% for msg in messages %}
      <li{% if msg.tags %} class="{{ msg.tags }}"{% endif %}>{{ msg }}</li>
    {% endfor %}
  </ul>
{% endif %}
<form method="post" action="{% url 'register' %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="pw">Password</label>
        <div class="password-wrapper">
          <input type="password" id="pw" name="password" placeholder="Create a password" required>
          <button type="button" class="toggle-pw" onclick="var p=document.getElementById('pw');p.type=p.type==='password'?'text':'password';this.textContent=p.type==='password'?'👁':'🙈'">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label for="cpw">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="cpw" name="confirm_password" placeholder="Confirm your password" required>
          <button type="button" class="toggle-pw" onclick="var p=document.getElementById('cpw');p.type=p.type==='password'?'text':'password';this.textContent=p.type==='password'?'👁':'🙈'">👁</button>
        </div>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="terms" name="terms" value="on">
        <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>

    <div class="links">
      <p>Already have an account? <a href="{% url 'login' %}">Sign in here</a></p>
    </div>
  </div>
</div>

</body>
</html>
